    font-size="142"
    font-weight="650"
    letter-spacing="-4"
    fill="#101827"
  >L</text>
  <text
    x="102"
    y="154"
    font-family="Avenir Next, Helvetica Neue, Inter, Arial, sans-serif"
    font-size="142"
    font-weight="650"
    letter-spacing="-4"
  >
    <tspan fill="#101827">LODE</tspan>
