      <animate attributeName="opacity" values=".08;.24;.08" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="494" cy="143" r="15.5" fill="#E5484D" filter="url(#llode-dot-glow)"/>
    <circle cx="489" cy="138" r="2.8" fill="#FFFFFF" opacity="0">
